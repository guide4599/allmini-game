<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เกมจับคู่อีโมจิ | Memory Puzzle</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            background-color: #f0f8ff; 
            margin: 0; 
            padding: 20px; 
        }
        h1 { color: #333; margin-bottom: 5px; font-size: 24px; text-align: center; }
        
        .stats { 
            margin-bottom: 20px; 
            font-size: 20px; 
            color: #555; 
            background: white;
            padding: 10px 30px;
            border-radius: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .moves { color: #e91e63; font-weight: bold; font-size: 24px; }
        
        .game-board { 
            display: grid; 
            grid-template-columns: repeat(4, 70px); 
            gap: 8px; 
            margin-bottom: 25px;
        }
        
        .card { 
            width: 70px; 
            height: 70px; 
            background-color: #ff5722; 
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-size: 35px; 
            cursor: pointer; 
            color: transparent; 
            transition: transform 0.2s, background-color 0.3s; 
            user-select: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .card:active { transform: scale(0.95); }
        .card.flipped { background-color: #fff; color: #000; cursor: default; }
        .card.matched { background-color: #ffeb3b; color: #000; cursor: default; animation: pop 0.3s ease; }
        
        /* จัดกลุ่มปุ่มกดให้อยู่ด้วยกัน */
        .action-buttons {
            display: flex;
            gap: 15px; /* ระยะห่างระหว่างปุ่ม */
            margin-bottom: 10px;
        }

        button { 
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold;
            cursor: pointer; 
            background-color: #2196F3; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.2s;
        }
        button:hover { background-color: #0b7dda; transform: scale(1.05); }

        /* ตกแต่งปุ่มกลับหน้าแรก */
        .home-btn {
            display: flex;
            align-items: center;
            padding: 12px 20px; 
            font-size: 16px; 
            font-weight: bold;
            text-decoration: none;
            background-color: #607D8B; 
            color: white; 
            border-radius: 8px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            transition: background-color 0.2s, transform 0.2s;
        }
        .home-btn:hover { background-color: #455A64; transform: scale(1.05); }

        .visitor-counter {
            margin-top: 30px;
            text-align: center;
            background-color: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>

    <h1>🧩 เกมจับคู่อีโมจิ 🧩</h1>
    <div class="stats">
        เปิดไพ่: <span id="moves" class="moves">0</span> ครั้ง
    </div>
    
    <div class="game-board" id="game-board"></div>
    
    <div class="action-buttons">
        <button onclick="initGame()">🔄 เริ่มเกมใหม่</button>
        <a href="index.html" class="home-btn">🏠 กลับหน้าเมนูหลัก</a>
    </div>

    <div class="visitor-counter">
        <p style="color: #888; font-size: 14px; margin-top: 0; margin-bottom: 8px; font-weight: bold;">จำนวนผู้เข้าชมเกมนี้</p>
        <img src="https://profile-counter.glitch.me/guide4599/count.svg" alt="Visitor Count">
    </div>

    <script>
        const emojis = ['🐶', '🐱', '🐭', '🐰', '🦊', '🐻', '🐼', '🐸', '🐯', '🦁', '🐮', '🐷'];
        let cards = [...emojis, ...emojis]; 
        let moves = 0;
        let flippedCards = [];
        let matchedPairs = 0;
        let isLocked = false;

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function initGame() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            shuffle(cards);
            moves = 0;
            matchedPairs = 0;
            flippedCards = [];
            isLocked = false;
            
            document.getElementById('moves').innerText = moves;

            cards.forEach((emoji) => {
                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.emoji = emoji;
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (isLocked || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            this.innerText = this.dataset.emoji;
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                document.getElementById('moves').innerText = moves;
                checkMatch();
            }
        }

        function checkMatch() {
            isLocked = true; 
            const [card1, card2] = flippedCards;

            if (card1.dataset.emoji === card2.dataset.emoji) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                matchedPairs++;
                flippedCards = [];
                isLocked = false;

                if (matchedPairs === emojis.length) {
                    setTimeout(() => {
                        alert(`🎉 ยินดีด้วย! คุณจับคู่สำเร็จแล้ว!\nใช้การเปิดไพ่ไปทั้งหมด: ${moves} ครั้ง\n\nรีเฟรชหรือกดปุ่มเริ่มใหม่เพื่อเล่นอีกรอบได้เลย!`);
                    }, 500);
                }
            } else {
                setTimeout(() => {
                    card1.classList.remove('flipped');
                    card2.classList.remove('flipped');
                    card1.innerText = '';
                    card2.innerText = '';
                    flippedCards = [];
                    isLocked = false;
                }, 600); 
            }
        }

        initGame();
    </script>
</body>
</html>
